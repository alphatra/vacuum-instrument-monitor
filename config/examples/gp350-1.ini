[General]
debug = false
log_level = info

[Connection]
module_type = auto
serial_port = auto
timeout = 1.0
write_timeout = 1.0

[Detection]
device_index = 0
probe_timeout = 0.35
scan_rs485 = false
rs485_addresses = 0-31

[Collector]
interval_seconds = 1.0

[Device]
device_type = gp350
device_name = GP350_1
channel = IG1
pressure_unit = Torr

[File]
csv_filepath = /opt/vacuum-instrument-monitor/data/gp350_1.csv
csv_mode = append
log_file = /opt/vacuum-instrument-monitor/logs/gp350_1.log

[InfluxDB]
enabled = true
url = https://influx.example.com
org = lab
bucket = vacuum
token =
token_env = INFLUXDB_TOKEN
measurement = vacuum_pressure
timeout = 3.0
retries = 3
fail_on_error = false
