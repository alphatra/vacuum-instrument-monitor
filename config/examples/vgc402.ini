[General]
debug = false
log_level = info

[Connection]
module_type = serial
serial_port = auto
baudrate = 9600
bytesize = 8
parity = none
stopbits = 1
line_terminator = crlf
timeout = 1.0
write_timeout = 1.0

[Detection]
device_index = 0
probe_timeout = 0.5
scan_rs485 = false

[Collector]
# PR1 = channel 1, PR2 = channel 2, PRX = all channels.
command = PRX
interval_seconds = 1.0

[Device]
device_type = inficon_vgc402
device_name = VGC402_1
# PRX writes CH1 and CH2 automatically.
channel = ALL
# auto reads the display unit using UNI at collector startup.
pressure_unit = auto

[File]
csv_filepath = data/vgc402_readings.csv
csv_mode = overwrite
log_file = logs/vgc402_collector.log

[InfluxDB]
enabled = false
url = http://localhost:8086
org =
bucket =
token =
token_env = INFLUXDB_TOKEN
measurement = vacuum_pressure
timeout = 2.0
retries = 1
fail_on_error = false
