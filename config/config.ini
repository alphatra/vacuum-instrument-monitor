[General]
# debug:
#   false - loguje tylko ważne zdarzenia
#   true  - dodaje logi debug dla poprawnych próbek
debug = false

# log_level:
#   debug   - najwięcej informacji
#   info    - normalna praca
#   warning - tylko ostrzeżenia i błędy
#   error   - tylko błędy
log_level = info

[Connection]
# module_type:
#   auto    - autodetekcja GP350; kolektor sam dobiera digital albo rs232
#   rs232   - starszy RS-232 Module, default: 300 baud, 7N2, command DS IG
#   digital - PC/RS-232/RS-485 Digital Interface, default: 9600 baud, 8N1, command RD
module_type = auto

# serial_port:
#   auto - przeskanuje porty USB/serial i wybierze GP350 według [Detection]
#   port z virtual_gp350.py, np. /dev/ttys005
#   port prawdziwego urządzenia, np. /dev/cu.usbserial-XXXX
#   można nadpisać w CLI: --port /dev/ttysXXX
serial_port = auto

# baudrate:
#   dozwolone według GP350: 75, 150, 300, 600, 1200, 2400, 4800, 9600, 19200
#   RS-232 Module fabrycznie: 300
#   Digital Interface fabrycznie: 9600
#   odkomentuj tylko jeśli chcesz override module_type
# baudrate = 9600

# bytesize/parity/stopbits:
#   RS-232 Module fabrycznie: 7, none, 2
#   Digital Interface fabrycznie: 8, none, 1
#   odkomentuj tylko jeśli chcesz override module_type
# bytesize = 8
# parity = none
# stopbits = 1

# line_terminator:
#   rs232 default: crlf
#   digital default: cr
#   wartości: crlf, cr, lf
# line_terminator = cr

# rs485_address:
#   puste - zwykły RS-232 / virtual serial bez adresu
#   0-31  - kolektor wyśle #AA przed komendą, np. #01RD
rs485_address =

# timeout/write_timeout:
#   dodatnia liczba sekund
timeout = 1.0
write_timeout = 1.0

[Detection]
# device_index:
#   gdy wykryte są 2 GP350, index 0 = pierwszy port, index 1 = drugi port
#   do dwóch kolektorów użyj dwóch configów albo CLI --auto-device-index 0/1
device_index = 0

# probe_timeout:
#   krótki timeout tylko dla skanowania portów
probe_timeout = 0.35

# scan_rs485:
#   false - szybki scan: tylko bez adresu, typowe USB-RS232
#   true  - wolniej: próbuje też #00-#31 dla RS-485 Digital Interface
scan_rs485 = false

# rs485_addresses:
#   zakres adresów do scan_rs485, np. 0-31 albo 1,2,5
rs485_addresses = 0-31

[Collector]
# command:
#   DS IG - odczyt ciśnienia w RS-232 Module
#   RD    - odczyt ciśnienia w Digital Interface
#   DGS   - status degas, nie pomiar ciśnienia
#   odkomentuj tylko jeśli chcesz override module_type
# command = RD

# interval_seconds:
#   dodatnia liczba sekund między pomiarami
interval_seconds = 1.0

[Device]
# device_name/channel:
#   etykiety wpisywane do CSV; przydatne, gdy będzie więcej urządzeń
device_name = GP350_1
channel = IG1

[File]
# csv_filepath:
#   ścieżka do pliku pomiarów
csv_filepath = data/gp350_readings.csv

# csv_mode:
#   overwrite - przy starcie tworzy/nadpisuje CSV i od razu zapisuje nagłówek
#   append    - dopisuje do istniejącego CSV; nagłówek tylko dla nowego pliku
csv_mode = overwrite

# log_file:
#   ścieżka do logów kolektora
log_file = logs/collector.log

[InfluxDB]
# enabled:
#   false - tylko CSV/log
#   true  - CSV + zapis do InfluxDB v2, potem Grafana czyta bucket
enabled = false

# url/org/bucket:
#   url    - adres InfluxDB, zwykle http://localhost:8086
#   org    - organizacja InfluxDB
#   bucket - bucket na pomiary GP350
url = http://localhost:8086
org =
bucket =

# token:
#   zalecane: zostaw token pusty i ustaw env INFLUXDB_TOKEN
#   awaryjnie: wpisz token tutaj
token =
token_env = INFLUXDB_TOKEN

# measurement:
#   nazwa pomiaru widoczna w Grafanie
measurement = gp350_reading

# timeout/retries/fail_on_error:
#   timeout       - czas HTTP write do InfluxDB
#   retries       - powtórki przy błędzie zapisu
#   fail_on_error - false: CSV działa dalej mimo błędu InfluxDB
timeout = 2.0
retries = 1
fail_on_error = false
